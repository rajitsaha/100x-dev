# 100x Dev — Release Pipeline Template
# Copy to .github/workflows/release.yml in your project.
#
# Required secrets (GitHub repo Settings → Secrets):
#   DOCKERHUB_USERNAME    — Docker Hub username (if using Docker)
#   DOCKERHUB_TOKEN       — Docker Hub access token (if using Docker)
#   NPM_TOKEN             — npm access token (if using npm)
#   HOMEBREW_TAP_TOKEN    — PAT with repo scope for homebrew tap (optional)
#
# Required variables (GitHub repo Settings → Variables):
#   HOMEBREW_TAP          — e.g. "yourorg/homebrew-tap" (optional)
#
# PyPI: uses OIDC trusted publishing — no API key needed.
# Configure at: https://pypi.org/manage/account/publishing/

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ── 1. Pre-release checks ────────────────────────────────────────────────────
  pre-release-checks:
    name: Pre-release Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        run: pip install ruff --quiet && ruff check . && ruff format --check .

      - name: Run unit tests
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        run: pytest tests/unit/ -v

      - name: Enforce 95% test coverage
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        run: pip install pytest-cov --quiet && pytest tests/unit/ --cov --cov-fail-under=95 -q

      - name: Set up Node 22
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Node lint and test
        if: hashFiles('package.json') != ''
        run: npm ci && npm run lint && npm test

      - name: Version consistency check (pyproject.toml)
        if: hashFiles('pyproject.toml') != ''
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          [ "$TAG_VERSION" = "$PKG_VERSION" ] || (echo "ERROR: Tag $TAG_VERSION != pyproject.toml $PKG_VERSION" && exit 1)
          echo "Version check passed: $TAG_VERSION"

      - name: Version consistency check (package.json)
        if: hashFiles('package.json') != ''
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          [ "$TAG_VERSION" = "$PKG_VERSION" ] || (echo "ERROR: Tag $TAG_VERSION != package.json $PKG_VERSION" && exit 1)

  # ── 2. Build Python package ──────────────────────────────────────────────────
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: pre-release-checks
    if: hashFiles('pyproject.toml', 'setup.py') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build and verify
        run: pip install build twine --quiet && python -m build && twine check dist/*

      - name: Smoke test wheel in fresh venv
        run: |
          python3 -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl --quiet
          PACKAGE=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'].replace('-','_'))")
          /tmp/smoke-venv/bin/python -c "import $PACKAGE; print('Import OK')"
          rm -rf /tmp/smoke-venv

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  # ── 3. Build npm package ─────────────────────────────────────────────────────
  build-npm:
    name: Build npm Package
    runs-on: ubuntu-latest
    needs: pre-release-checks
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Build and dry-run pack
        run: npm ci && npm run build --if-present && npm pack --dry-run

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-dist
          path: "*.tgz"

  # ── 4. Build and push Docker images ─────────────────────────────────────────
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: pre-release-checks
    if: hashFiles('Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Create GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [pre-release-checks, build-python, build-npm, build-docker]
    if: always() && needs.pre-release-checks.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md 2>/dev/null || echo "See CHANGELOG.md for details.")
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: "${{ steps.changelog.outputs.notes }}"
          files: |
            dist/*
            *.tgz
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ── 6. Publish to PyPI ───────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    if: needs.build-python.result == 'success'
    environment:
      name: pypi
      url: https://pypi.org/project/${{ github.event.repository.name }}/
    permissions:
      id-token: write
    steps:
      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 7. Publish to npm ────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: github-release
    if: needs.build-npm.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm ci && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 8. Verify releases ───────────────────────────────────────────────────────
  verify-releases:
    name: Verify Releases
    runs-on: ubuntu-latest
    needs: [github-release, build-docker, publish-pypi, publish-npm]
    if: always() && needs.github-release.result == 'success'
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Set up Python (for PyPI verification)
        if: needs.publish-pypi.result == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node (for npm verification)
        if: needs.publish-npm.result == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify PyPI release (with retry)
        if: needs.publish-pypi.result == 'success'
        run: |
          PACKAGE=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          PACKAGE_IMPORT=$(echo $PACKAGE | tr '-' '_')
          for i in 1 2 3 4 5; do
            sleep 20
            pip install "$PACKAGE==${{ steps.version.outputs.version }}" --quiet 2>/dev/null && \
              python3 -c "import $PACKAGE_IMPORT; print('PyPI verified ✅')" && break
            echo "Attempt $i/5 — retrying..."
          done

      - name: Verify npm release
        if: needs.publish-npm.result == 'success'
        run: |
          PKG=$(node -e "console.log(require('./package.json').name)" 2>/dev/null || echo "")
          [ -n "$PKG" ] && npm install "$PKG@${{ steps.version.outputs.version }}" --dry-run && echo "npm verified ✅"

      - name: Verify Docker Hub release
        if: needs.build-docker.result == 'success'
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ steps.version.outputs.version }}
          echo "Docker Hub verified ✅"

  # ── 9. Update Homebrew tap ───────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: verify-releases
    if: vars.HOMEBREW_TAP != ''
    steps:
      - name: Wait for propagation
        run: sleep 30

      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: ${{ github.event.repository.name }}
          homebrew-tap: ${{ vars.HOMEBREW_TAP }}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
