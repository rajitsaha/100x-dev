# 100x Dev — CI Pipeline Template
# Copy to .github/workflows/ci.yml in your project.
#
# Jobs:
#   lint            — ESLint, TypeScript, ruff (auto-detected)
#   unit-tests      — Unit + integration against real Docker services
#   e2e-tests       — Full-stack Docker Compose + Playwright E2E
#
# Triggers: push to any branch, pull_request to main/master

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: ESLint
        if: hashFiles('package.json', '.eslintrc*', 'eslint.config*') != ''
        run: npm run lint

      - name: TypeScript type check
        if: hashFiles('tsconfig.json') != ''
        run: npm run typecheck 2>/dev/null || npx tsc --noEmit

      - name: Set up Python 3.12
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: ruff lint + format check
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        run: pip install ruff --quiet && ruff check . && ruff format --check .

  # ── 2. Unit + Integration Tests (real Docker services) ───────────────────────
  unit-tests:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    # Real services — no mocks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        # TRAP: if any dependency in package.json doesn't exist on the npm registry
        # (e.g. a local-only package not yet published), npm ci will fail with a 404.
        # Fix: use "file:./path/to/pkg" in package.json, or vendor the source directly
        # into the build context and import it as a local file.
        run: npm ci

      - name: Run Node unit + integration tests (real DB — no mocks)
        if: hashFiles('package.json') != ''
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm test

      - name: Enforce 95% coverage (Node)
        if: hashFiles('package.json') != ''
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
        run: npm run test:coverage

      - name: Set up Python 3.12
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        run: pip install -e ".[dev]"

      - name: Run Python unit + integration tests (real DB — no mocks)
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
        # TRAP: running only tests/unit/ silently excludes integration tests from the gate.
        # Docker-build failures, DB regressions, and unpublished-package 404s only surface
        # after merge if integration tests aren't included here.
        run: pytest tests/unit/ tests/integration/ -v --tb=short

      - name: Enforce 95% coverage (Python)
        if: hashFiles('pyproject.toml', 'setup.py') != ''
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
        run: |
          pip install pytest-cov --quiet
          pytest tests/unit/ tests/integration/ --cov --cov-fail-under=95 -q

  # ── 3. E2E Tests (full Docker Compose stack + Playwright) ───────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    # Only run E2E if an E2E config or e2e directory exists
    if: |
      hashFiles(
        'playwright.e2e.config.ts',
        'playwright.e2e.config.js',
        'e2e/**',
        'tests/e2e/**',
        'docker-compose.e2e.yml',
        'docker-compose.test.yml'
      ) != ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start full stack via Docker Compose
        run: |
          # Use E2E override if available, otherwise fall back
          if [ -f docker-compose.e2e.yml ] && [ -f docker-compose.yml ]; then
            docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --build
            echo "COMPOSE_CMD=docker compose -f docker-compose.yml -f docker-compose.e2e.yml" >> $GITHUB_ENV
          elif [ -f docker-compose.test.yml ]; then
            docker compose -f docker-compose.test.yml up -d --build
            echo "COMPOSE_CMD=docker compose -f docker-compose.test.yml" >> $GITHUB_ENV
          else
            docker compose up -d --build
            echo "COMPOSE_CMD=docker compose" >> $GITHUB_ENV
          fi

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for application to be healthy..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo "API healthy ✅ (attempt $i)"
              break
            elif curl -sf http://localhost:3000/health >/dev/null 2>&1; then
              echo "App healthy ✅ (attempt $i)"
              break
            elif curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "App healthy ✅ (attempt $i)"
              break
            fi
            echo "Attempt $i/24 — waiting 5s..."
            sleep 5
            if [ $i -eq 24 ]; then
              echo "❌ Services did not become healthy in 2 minutes"
              ${{ env.COMPOSE_CMD }} logs --tail=100
              exit 1
            fi
          done

      # TRAP: if a React component uses useState(false) + useEffect(() => setState(true), [])
      # to trigger a CSS enter-animation, the element starts with opacity-0. Playwright's
      # toBeVisible() fails on opacity-0 elements and the test times out. In a client-only
      # SPA there is no SSR reason to defer visibility — initialize to true directly:
      #   const mounted = true;   // or useState(true) if you still need reactivity
      - name: Run smoke tests first (fast gate)
        id: smoke
        run: |
          if [ -d e2e/smoke ]; then
            BASE_URL="${E2E_BASE_URL:-http://localhost:3000}" \
            npx playwright test e2e/smoke/ --config=playwright.e2e.config.ts
          else
            echo "No smoke tests directory — skipping smoke gate"
          fi
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Run full E2E suite
        id: e2e
        run: |
          CONFIG_FILE=""
          if [ -f playwright.e2e.config.ts ]; then
            CONFIG_FILE="playwright.e2e.config.ts"
          elif [ -f playwright.e2e.config.js ]; then
            CONFIG_FILE="playwright.e2e.config.js"
          elif [ -f e2e/playwright.config.ts ]; then
            CONFIG_FILE="e2e/playwright.config.ts"
          fi

          if [ -n "$CONFIG_FILE" ]; then
            BASE_URL="${E2E_BASE_URL:-http://localhost:3000}" \
            npx playwright test --config="$CONFIG_FILE"
          else
            echo "No E2E Playwright config found — skipping"
          fi
        env:
          E2E_BASE_URL: http://localhost:3000

      - name: Run Python E2E tests (if present)
        if: hashFiles('tests/e2e/**') != ''
        run: |
          pip install -e ".[dev]" --quiet 2>/dev/null || true
          BASE_URL="${E2E_BASE_URL:-http://localhost:8000}" \
          pytest tests/e2e/ -v --tb=short
        env:
          E2E_BASE_URL: http://localhost:8000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Dump container logs on failure
        if: failure()
        run: ${{ env.COMPOSE_CMD }} logs --tail=200

      - name: Tear down Docker stack
        if: always()
        run: ${{ env.COMPOSE_CMD }} down -v 2>/dev/null || true
